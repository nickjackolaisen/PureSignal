name: extension-release

on:
  workflow_dispatch:
  push:
    tags:
      - "extension-v*"

jobs:
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate core and safe rules
        run: |
          CG_MAX_RULES=100000 CG_CHUNK_SIZE=30000 node extension/scripts/generate-core-rules.mjs
          node extension/scripts/generate-safebrowsing-rules.mjs
      - name: Pack extension ZIP
        run: |
          cd extension
          zip -r ../puresignal-extension.zip . -x "*.DS_Store" -x "_metadata/*"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: puresignal-extension
          path: puresignal-extension.zip
